name: Weekly CLI Tools Update

on:
  schedule:
    # Una vez por semana: Domingo a las 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install httpx
      
      - name: Run weekly CLI update
        run: python scripts/fetch_cli_weekly.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          WEEK=$(date +%Y-W%V)
          git diff --cached --quiet || git commit -m "Weekly CLI update: $WEEK"
          git push
