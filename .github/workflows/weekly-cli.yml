name: Daily CLI Tools Update (7-Day)

on:
  schedule:
    # Diariamente a las 12:00 UTC (mide últimos 7 días)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install httpx
      
      - name: Run weekly CLI update
        run: python scripts/fetch_cli_weekly.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          WEEK=$(date +%Y-W%V)
          DATE=$(date +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "Daily CLI 7-Day update: $DATE"
          git push
