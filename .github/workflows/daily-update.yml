name: Daily Ecosystem Update

on:
  schedule:
    # Dos veces al día: 9:00 AM y 9:00 PM UTC
    # Mañana: captura overnight activity
    # Noche: captura daytime activity
    - cron: '0 9 * * *'   # 9:00 AM UTC
    - cron: '0 21 * * *'  # 9:00 PM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install httpx anthropic python-dotenv
          npm install -g skills
      
      - name: Run daily update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_update.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          DATE=$(date +%Y-%m-%d)
          HOUR=$(date +%H)
          if [ "$HOUR" -lt 12 ]; then
            TIME_LABEL="Morning"
          else
            TIME_LABEL="Evening"
          fi
          
          # Solo commit si hay cambios
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          
          git commit -m "Daily $TIME_LABEL update: $DATE"
          
          # Pull con rebase para evitar conflictos
          git pull --rebase origin main || git pull --no-rebase origin main
          
          # Push
          git push
